<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limitlest</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #1a1a1a 0%, #2d2d2d 30%, #f39c12 70%, #e67e22 100%);
            background-size: 400% 400%;
            animation: blackYellowGradient 10s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        @keyframes blackYellowGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(243,156,18,0.6), transparent 40%),
                radial-gradient(circle at 75% 75%, rgba(243,156,18,0.4), transparent 40%);
            animation: glowFloat 15s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes glowFloat {
            0% { transform: scale(1) translateY(0px); opacity: 0.8; }
            50% { transform: scale(1.1) translateY(-10px); opacity: 1; }
            100% { transform: scale(1) translateY(0px); opacity: 0.8; }
        }

        .container {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 2.5rem 2rem;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.5),
                0 0 0 1px rgba(243,156,18,0.5),
                inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            z-index: 1;
            animation: fadeInUp 1s ease-out;
            border: 2px solid rgba(243,156,18,0.7);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-container {
            margin-bottom: 1.5rem;
        }

        .custom-logo-img {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            object-fit: cover;
            box-shadow: 0 12px 30px rgba(243,156,18,0.6);
            border: 3px solid rgba(243,156,18,0.9);
            transition: all 0.3s ease;
            margin-bottom: 0.5rem;
        }

        .custom-logo-img:hover {
            transform: scale(1.1);
            box-shadow: 0 18px 40px rgba(243,156,18,0.8);
        }

        h1 {
            color: #f39c12;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(243,156,18,0.8);
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 15px rgba(243,156,18,0.6); }
            to { text-shadow: 0 0 25px rgba(243,156,18,1); }
        }

        .subtitle {
            color: #ddd;
            font-size: 1rem;
            margin-bottom: 2rem;
            line-height: 1.5;
            font-weight: 400;
        }

        .platforms {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .platform {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(243,156,18,0.15);
            border: 2px solid rgba(243,156,18,0.5);
            border-radius: 16px;
            padding: 1.2rem;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(243,156,18,0.3);
        }

        .platform::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .platform:hover::before {
            left: 100%;
        }

        .platform:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(243,156,18,0.5);
            border-color: rgba(243,156,18,0.8);
            background: rgba(243,156,18,0.25);
        }

        .platform-icon {
            font-size: 1.8rem;
            width: 55px;
            height: 55px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 6px 18px rgba(0,0,0,0.4);
        }

        .platform.discord .platform-icon {
            background: linear-gradient(135deg, #5865f2, #4752c4);
            color: white;
        }

        .platform.whatsapp .platform-icon {
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: white;
        }

        .platform-info {
            flex: 1;
            text-align: left;
        }

        .platform-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        @media (max-width: 480px) {
            .container { padding: 2rem 1.5rem; margin: 1rem; }
            h1 { font-size: 1.4rem; }
            .custom-logo-img { width: 60px; height: 60px; }
            .platform { padding: 1rem; gap: 0.8rem; }
            .platform-icon { width: 48px; height: 48px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <!-- Logo Catbox kamu -->
            <img class="custom-logo-img" 
                 src="https://files.catbox.moe/tz9eny.png" 
                 alt="Limitlest Logo" onload="this.style.opacity=1" style="opacity:0;transition:opacity 0.5s;">
        </div>
        
        <h1>Limitlest</h1>
        <p class="subtitle">Join Discord & WhatsApp Group sekarang!</p>
        
        <div class="platforms">
            <!-- Discord -->
            <a href="https://discord.gg/2h8Ut7mHJ" target="_blank" class="platform discord" rel="noopener noreferrer">
                <div class="platform-icon">
                    <i class="fab fa-discord"></i>
                </div>
                <div class="platform-info">
                    <div class="platform-name">Limitlest Discord</div>
                </div>
            </a>
            
            <!-- WhatsApp Group - LINK UDAH MASUK! -->
            <a href="https://chat.whatsapp.com/CiKAhwQb0nx42v1ZexnAo7" target="_blank" class="platform whatsapp" rel="noopener noreferrer">
                <div class="platform-icon">
                    <i class="fab fa-whatsapp"></i>
                </div>
                <div class="platform-info">
                    <div class="platform-name">Limitlest WA Group</div>
                </div>
            </a>
        </div>
    </div>

    <script>
        // Fade in logo
        document.querySelector('.custom-logo-img').addEventListener('load', function() {
            this.style.opacity = '1';
        });
    </script>
</body>
</html>
