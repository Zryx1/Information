<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limitlest Discord</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #5865f2, #4752c4, #667eea, #99a3ff);
            background-size: 400% 400%;
            animation: discordGradient 8s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        @keyframes discordGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4), transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.2), transparent 50%);
            animation: floatLight 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatLight {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-30px); }
        }

        .container {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 3rem 2rem;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 
                0 25px 50px rgba(88, 101, 242, 0.3),
                0 0 0 1px rgba(255,255,255,0.9);
            position: relative;
            z-index: 1;
            animation: fadeInUp 1s ease-out;
            border: 2px solid rgba(88, 101, 242, 0.2);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-container {
            margin-bottom: 1.5rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-container:hover {
            transform: scale(1.08) rotate(2deg);
        }

        .custom-logo-img {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            object-fit: cover;
            box-shadow: 0 15px 35px rgba(88,101,242,0.4);
            border: 4px solid rgba(255,255,255,0.9);
            transition: all 0.4s ease;
        }

        .custom-logo-img:hover {
            transform: scale(1.15) rotate(8deg);
            box-shadow: 0 20px 45px rgba(88,101,242,0.6);
        }

        .discord-logo {
            font-size: 4.2rem;
            background: linear-gradient(135deg, #5865f2, #7289da, #99aab5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 8px 25px rgba(88,101,242,0.5));
            margin-top: 0.5rem;
            animation: discordGlow 2s ease-in-out infinite alternate;
        }

        @keyframes discordGlow {
            from { filter: drop-shadow(0 8px 25px rgba(88,101,242,0.5)); }
            to { filter: drop-shadow(0 8px 35px rgba(88,101,242,0.8)); }
        }

        h1 {
            color: #2c2f33;
            font-size: 2.3rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, #5865f2, #7289da);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            font-weight: 500;
        }

        .platform {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            background: linear-gradient(135deg, rgba(88,101,242,0.1), rgba(114,137,218,0.1));
            border: 3px solid rgba(88, 101, 242, 0.3);
            border-radius: 20px;
            padding: 1.5rem 1.8rem;
            color: #2c2f33;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(88,101,242,0.2);
        }

        .platform::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.7s;
        }

        .platform:hover::before {
            left: 100%;
        }

        .platform:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px rgba(88,101,242,0.4);
            border-color: rgba(88, 101, 242, 0.6);
            background: linear-gradient(135deg, rgba(88,101,242,0.15), rgba(114,137,218,0.15));
        }

        .platform-icon {
            font-size: 2.2rem;
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: linear-gradient(135deg, #5865f2, #4752c4);
            color: white;
            box-shadow: 0 8px 20px rgba(88,101,242,0.4);
        }

        .platform-info {
            flex: 1;
            text-align: left;
        }

        .platform-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #5865f2;
        }

        .platform-link {
            font-size: 0.95rem;
            color: #7289da;
            word-break: break-all;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .container { padding: 2.5rem 1.5rem; margin: 1rem; }
            h1 { font-size: 2rem; }
            .custom-logo-img { width: 75px; height: 75px; }
            .discord-logo { font-size: 3.5rem; }
            .platform { padding: 1.3rem 1.5rem; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <!-- Custom Logo akan dimuat dari Data.txt -->
            <img id="customLogo" class="custom-logo-img" src="https://files.catbox.moe/tz9eny.png" alt="Limitlest">
            <div class="discord-logo">𝐃𝐢𝐬𝐜𝐨𝐫𝐝</div>
        </div>
        <h1>Limitlest</h1>
        <p class="subtitle">Server Discord paling seru untuk ngobrol dan gaming!</p>
        
        <a href="https://discord.gg/2h8Ut7mHJ" target="_blank" class="platform discord" rel="noopener noreferrer">
            <div class="platform-icon">
                <i class="fab fa-discord"></i>
            </div>
            <div class="platform-info">
                <div class="platform-name">Limitlest</div>
                <div class="platform-link">discord.gg/2h8Ut7mHJ</div>
            </div>
        </a>
    </div>
</body>
</html>
